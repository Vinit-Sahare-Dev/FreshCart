# Server configuration
server.port=8080

# DataSource configuration (adjust credentials/URL for your environment)
spring.datasource.url=jdbc:mysql://localhost:3306/hotel_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=hotel_user
spring.datasource.password=hotel_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# CORS and frontend origin (adjust port if your Vite dev server differs)
app.frontend.origin=http://localhost:5173

# JWT and payment placeholders
app.security.jwt.secret=CHANGE_ME_SECRET_KEY
app.security.jwt.expiration-ms=86400000

