# Server configuration
server.port=8080

# DataSource configuration
spring.datasource.url=jdbc:mysql://localhost:3306/hotel_db?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=hotel_user
spring.datasource.password=hotel_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# CORS and frontend origin
app.frontend.origin=http://localhost:5173

# JWT (change this to a secure random string)
app.security.jwt.secret=mySuperSecretJWTKeyForHotelApplication2024
app.security.jwt.expiration-ms=86400000

spring.main.allow-bean-definition-overriding=true